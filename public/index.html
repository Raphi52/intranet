<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding Amitel · Checklist nouveau collaborateur</title>
    <meta
      name="description"
      content="Application d'accueil des nouveaux collaborateurs Amitel : checklist interactive et ludique."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="entete">
      <a class="logo" href="#/" aria-label="Accueil Onboarding Amitel">
        <svg class="logo__mark" viewBox="0 0 44 44" width="40" height="40" aria-hidden="true">
          <rect x="1" y="1" width="42" height="42" rx="11" fill="var(--rouge)" />
          <text
            x="22"
            y="32"
            text-anchor="middle"
            font-family="Poppins, sans-serif"
            font-size="30"
            font-weight="700"
            fill="#fff"
          >
            a
          </text>
        </svg>
        <span class="logo__texte">mitel</span>
        <span class="logo__sep" aria-hidden="true"></span>
        <span class="logo__app">Onboarding</span>
      </a>
      <div class="entete__actions" id="entete-actions"></div>
    </header>

    <main id="app" class="contenu">
      <div class="chargement">Chargement…</div>
    </main>

    <!-- Conteneur des notifications (toasts) -->
    <div id="toasts" class="toasts" aria-live="polite"></div>

    <!-- Canvas pour les confettis de célébration -->
    <canvas id="confetti" class="confetti"></canvas>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
